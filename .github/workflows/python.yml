name: Python CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: |
          python -m py_compile bot.py config.py settings.py services.py app.py twitch_api.py download.py rclone.py db.py

      - name: Create test config
        run: |
          python -c "import shutil; shutil.copy('tests/fixtures/ci_config.json', 'config.json')"

      - name: Run tests
        run: |
          pytest
        env:
          PYTHONPATH: .
